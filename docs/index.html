<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル計算機</title>
    <style>
        /* 全体のスタイルとリセット */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
        }

        /* 計算機本体のデザイン */
        .calculator {
            background-color: #333;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            width: 300px;
            overflow: hidden;
        }

        /* ディスプレイ（計算結果の表示部分） */
        .display {
            background-color: #222;
            color: #fff;
            font-size: 2.5rem;
            text-align: right;
            padding: 20px;
            border: none;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        /* ボタンのグリッドレイアウト */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background-color: #444;
        }

        /* 個別のボタンのデザイン */
        button {
            border: none;
            background-color: #555;
            color: white;
            font-size: 1.5rem;
            padding: 20px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #777;
        }

        button:active {
            background-color: #999;
        }

        /* 特別なボタンの色分け */
        .operator {
            background-color: #ff9500;
        }

        .operator:hover {
            background-color: #ffb03b;
        }

        .clear {
            background-color: #d4d4d2;
            color: #1c1c1c;
        }

        .clear:hover {
            background-color: #e6e6e6;
        }

        /* 「0」ボタンを2列分広くする */
        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" class="display" id="display" disabled value="0">
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="clear" onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="appendValue('/')">÷</button>
            <button class="operator" onclick="appendValue('*')">×</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">−</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" style="grid-row: span 2;" onclick="calculate()">=</button>
            
            <button class="zero" onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        // 画面に数字や記号を追加する関数
        function appendValue(value) {
            if (display.value === '0' && value !== '.') {
                display.value = value;
            } else {
                display.value += value;
            }
        }

        // 画面をリセットする関数 (Cボタン)
        function clearDisplay() {
            display.value = '0';
        }

        // 1文字消去する関数 (DELボタン)
        function deleteLast() {
            if (display.value.length > 1) {
                display.value = display.value.slice(0, -1);
            } else {
                display.value = '0';
            }
        }

        // 計算を実行する関数 (=ボタン)
        function calculate() {
            try {
                // eval関数を使って文字列を数式として計算
                // ※注意: evalはシンプルですが、実際のプロダクトでユーザー入力に使う場合はセキュリティ上の配慮が必要です。
                let result = eval(display.value);
                
                // 小数点以下が長くなりすぎるのを防ぐ処理
                if (result % 1 !== 0) {
                    result = parseFloat(result.toFixed(8));
                }
                
                display.value = result;
            } catch (error) {
                display.value = 'エラー';
                setTimeout(clearDisplay, 1500); // 1.5秒後に自動クリア
            }
        }
    </script>
</body>
</html>
